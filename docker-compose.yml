version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon
      POSTGRES_DB: beacon_network
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beacon -d beacon_network"]
      interval: 5s
      timeout: 5s
      retries: 5

  python-core:
    build:
      context: .
      dockerfile: backend/python/Dockerfile
    environment:
      PYTHON_SERVICE_PORT: 5000
      HMAC_SECRET_KEY: dev-secret-key
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  rust-engine:
    build:
      context: ./backend/rust
      dockerfile: Dockerfile
    environment:
      RUST_SERVICE_PORT: 9090
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy

  go-api:
    build:
      context: ./backend/go
      dockerfile: Dockerfile
    environment:
      GO_SERVICE_PORT: 8080
      DATABASE_URL: postgres://beacon:beacon@postgres:5432/beacon_network?sslmode=disable
      PYTHON_SERVICE_URL: http://python-core:5000
      RUST_SERVICE_URL: http://rust-engine:9090
      HMAC_SECRET_KEY: dev-secret-key
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      python-core:
        condition: service_started
      rust-engine:
        condition: service_started

volumes:
  pgdata:
